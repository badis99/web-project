    <!-- Session-aware navbar -->
    <script>
        document.getElementById('logout-btn').addEventListener('click', () => {
            fetch('/backend/routes/api.php?action=logout', {
                method: 'POST',
                credentials: 'include'
            }).then(() => {
                window.location.href = '/frontend/home/index.html';
            });
        });
    </script>
    <script>
        fetch('/backend/routes/api.php?action=check-session', { credentials: 'include' })
            .then(r => r.json())
            .then(data => {
                const isAdmin = data.logged_in && String(data.role || '').trim().toLowerCase() === 'admin';
                if (!isAdmin) {
                    window.location.href = '/frontend/home/index.html';
                    return;
                }
                const workshopsLi = document.getElementById('nav-workshops');
                if (workshopsLi) {
                    workshopsLi.style.display = data.logged_in ? '' : 'none';
                }
                const workshopsManagementLi = document.getElementById('nav-workshops-management');
                if (workshopsManagementLi) {
                    workshopsManagementLi.style.display = isAdmin ? '' : 'none';
                }
                document.querySelectorAll('.nav-join-link').forEach(el => {
                    el.style.display = data.logged_in ? 'none' : '';
                });
                const btn = document.getElementById('nav-auth-btn');
                if (!btn) return;
                if (data.logged_in) {
                    btn.textContent = 'Logout';
                    btn.href = '#';
                    btn.addEventListener('click', e => {
                        e.preventDefault();
                        fetch('/backend/routes/api.php?action=logout', { method: 'POST', credentials: 'include' })
                            .then(() => { window.location.href = '/frontend/home/index.html'; });
                    });
                }
            })
            .catch(() => {});
    </script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — THEATRO INSAT</title>
    <meta name="description" content="Apply to join Theatro INSAT — Submit your registration.">
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="star-container"></div>

    <nav class="auth-navbar">
        <a href="/frontend/home/index.html" class="auth-nav-logo">
            <img src="../assets/592223353_1450031396707025_4416535021509855370_n.png" alt="Theatro Logo">
        </a>
        <ul class="auth-nav-links">
            <li><a href="/frontend/home/index.html">Home</a></li>
            <li><a href="/frontend/home/index.html#about">About</a></li>
            <li><a href="/frontend/home/index.html#shows">Shows</a></li>
            <li id="nav-workshops" style="display:none"><a href="/frontend/workshops/index.html">Workshops</a></li>
            <li class="nav-join-link" style="display:none"><a href="/frontend/auth/signup.html">Join Us</a></li>
            <li><a href="/frontend/contact/index.html">Contact</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>

    <main class="auth-page">
        <div class="auth-container">

            <div class="auth-header">
                <span class="auth-brand">Theatro</span>
                <span class="auth-subtitle">Apply to Join Us</span>
                <p class="auth-description">
                    Fill in the form below. Your application will be reviewed by our team before being accepted.
                </p>
            </div>

            <!-- Error/success toast rendered here by auth.js -->

            <form class="auth-form" id="signupForm" novalidate enctype="multipart/form-data">

                <!-- Row 1: Name -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="su-firstname">First Name</label>
                        <input
                            type="text"
                            id="su-firstname"
                            name="firstname"
                            placeholder="Foulen"
                            autocomplete="given-name"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="su-lastname">Last Name</label>
                        <input
                            type="text"
                            id="su-lastname"
                            name="lastname"
                            placeholder="Foulena"
                            autocomplete="family-name"
                            required>
                    </div>
                </div>

                <!-- Row 2: Email -->
                <div class="form-group">
                    <label for="su-email">Email Address</label>
                    <input
                        type="email"
                        id="su-email"
                        name="email"
                        placeholder="your@email.com"
                        autocomplete="email"
                        required>
                </div>

                <!-- Row 3: Phone + Birthdate -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="su-phone">Phone Number</label>
                        <input
                            type="tel"
                            id="su-phone"
                            name="phone"
                            placeholder="+216 XX XXX XXX"
                            autocomplete="tel">
                    </div>
                    <div class="form-group">
                        <label for="su-birthdate">Date of Birth</label>
                        <input
                            type="date"
                            id="su-birthdate"
                            name="birthdate"
                            autocomplete="bday">
                    </div>
                </div>

                <!-- Row 4: Year of Study -->
                <div class="form-group">
                    <label for="su-year">Year of Study</label>
                    <input
                        type="number"
                        id="su-year"
                        name="yearofstudy"
                        placeholder="e.g. 2"
                        min="1"
                        max="5">
                </div>

                <!-- Row 5: Field of Study -->
                <div class="form-group">
                    <label for="su-field">Field of Study</label>
                    <select id="su-field" name="fieldofstudy" required>
                        <option value="" disabled selected>Select your Field Of Study</option>
                        <option value="MPI">MPI</option>
                        <option value="CBA">CBA</option>
                        <option value="GL">GL</option>
                        <option value="RT">RT</option>
                        <option value="IIA">IIA</option>
                        <option value="IMI">IMI</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <!-- Revealed only when "Other" is selected -->
                <div class="form-group" id="su-field-other-group" style="display:none; margin-top:-14px;">
                    <label for="su-field-custom">Please specify your field</label>
                    <input
                        type="text"
                        id="su-field-custom"
                        name="fieldofstudy_custom"
                        placeholder="e.g. Génie Civil"
                        maxlength="100"
                        autocomplete="off">
                </div>

                <!-- Row 6: Department -->
                <div class="form-group">
                    <label for="su-department">Department</label>
                    <select id="su-department" name="department" required>
                        <option value="" disabled selected>Select your department</option>
                        <option value="Acting">Acting</option>
                        <option value="Music">Music</option>
                        <option value="Dancing">Dancing</option>
                        <option value="Writing">Writing</option>
                        <option value="Media">Media</option>
                    </select>
                </div>

                <!-- Row 7: Profile Picture -->
                <div class="form-group">
                    <label for="su-picture">Profile Picture <span style="font-weight:300;opacity:.6;">(optional — JPEG / PNG / WebP, max 5 MB)</span></label>
                    <input
                        type="file"
                        id="su-picture"
                        name="picture"
                        accept="image/jpeg,image/png,image/gif,image/webp">
                </div>

                <!-- Row 8: Motivation -->
                <div class="form-group">
                    <label for="su-whyjoin">Why do you want to join Theatro?</label>
                    <textarea
                        id="su-whyjoin"
                        name="whyjoin"
                        placeholder="Tell us briefly why you want to join..."
                        maxlength="1000"
                        required></textarea>
                </div>

                <!-- Row 9: Password -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="su-password">Password</label>
                        <input
                            type="password"
                            id="su-password"
                            name="password"
                            placeholder="••••••••"
                            autocomplete="new-password"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="su-password-confirm">Confirm Password</label>
                        <input
                            type="password"
                            id="su-password-confirm"
                            name="password_confirm"
                            placeholder="••••••••"
                            autocomplete="new-password"
                            required>
                    </div>
                </div>

                <button type="submit" class="auth-btn" id="signup-submit">Submit Application</button>

            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Log in</a></p>
            </div>

        </div>
    </main>

    <!-- Site footer -->
    <footer class="auth-site-footer">
        <div class="auth-site-footer-inner">
            <span>&copy; 2026 Theatro INSAT. All Rights Reserved.</span>
            <span class="auth-site-footer-links">
                <a href="/frontend/contact/index.html">Contact</a>
                <a href="/frontend/home/index.html#about">About</a>
            </span>
        </div>
    </footer>

    <script src="auth.js"></script>
</body>
</html>

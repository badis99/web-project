<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us - THEATRO INSAT</title>
</head>
<body>
    <script>
        fetch('/backend/routes/api.php?action=check-session', { credentials: 'include' })
            .then(response => response.json())
            .then(data => {
                window.location.replace(
                    data.logged_in ? '/frontend/home/index.html' : '/frontend/auth/signup.html'
                );
            })
            .catch(() => {
                window.location.replace('/frontend/auth/signup.html');
            });
    </script>
    <p>Redirecting...</p>
</body>
</html>
